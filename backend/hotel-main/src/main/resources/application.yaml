server:
  servlet:
    # Keep a non-versioned API context so we can host multiple API versions
    # under the same base path (e.g. /api/v1 and /api/v2).
    context-path: /api

logging:
  level:
    org.springframework.boot.web.embedded.tomcat: INFO

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: hotel
  datasource:
    url: "jdbc:mysql://localhost:3306/${MYSQL_DATABASE:boutique_hotel}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: "${MYSQL_USER}"
    password: "${MYSQL_PASSWORD}"
  # Optional convenience: can start docker compose automatically.
  # Disabled by default so the app can run even if the `docker` CLI isn't available.
  docker:
    compose:
      enabled: false
      file: ../docker/docker-compose.yaml
  jpa:
    open-in-view: false
  # Flyway helps manage database migrations, ensuring that the database schema is up-to-date after changes
  flyway:
    enabled: true
    locations: filesystem:../db/migration
    connect-retries: 30

# Springdoc / OpenAPI configuration
# Default springdoc path is /v3/api-docs which combined with the
# `server.servlet.context-path: /api` produces /api/v3/api-docs.
# Expose a single OpenAPI JSON at `/api/openapi.json` and keep the
# API base path non-versioned (`/api`). For versioning in future prefer
# controller-level paths (`/v1/...`), media-type/header versioning, or
# an API gateway. Avoid hardcoding a version here.
springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    url: /api/openapi.json

app:
  images:
    rooms-base-path: classpath:/static/images/rooms/
  hotel:
    name: Boutique Hotel Technikum
    email: contact@technikum-wien.example
    phone: "+43 1 234567"
    breakfast-price-per-person: 26.00
    address:
      street: Höchstädtplatz 6
      city: Vienna
      postal-code: "1200"
      country: Austria
    directions:
      by-train: "S-Bahn S1 or S2 to Technikum Wien (5 min walk)"
      by-car: "A2 exit 'Inzersdorf', follow B151 towards city center"
      parking: "Public parking garage (200m, €12/day)"
