spring:
  application:
    name: hotel
  # Spring Boot reads docker/docker-compose.yaml, starts the MySQL service, 
  # and auto-configures spring.datasource from the container metadata
  docker:
    compose:
      file: docker/docker-compose.yaml
  jpa:
    open-in-view: false
  # Flyway helps manage database migrations, ensuring that the database schema is up-to-date after changes
  flyway:
    enabled: true
    locations: filesystem:db/migration

app:
  images:
    rooms-base-path: classpath:/static/images/rooms/
